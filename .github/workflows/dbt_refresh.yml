name: BigQuery Table Refresh

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 5'

jobs:
  refresh-tables:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/113456966208/locations/global/workloadIdentityPools/depi-pool/providers/github-provider'
          service_account: 'expire-dbt-robot@depi-graduation-project-489604.iam.gserviceaccount.com'

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dbt
        run: |
          pip install dbt-bigquery

      - name: Create dbt Profile
        run: |
          mkdir -p ~/.dbt
          echo "default:
            outputs:
              dev:
                type: bigquery
                method: oauth
                project: depi-graduation-project-489604
                dataset: staging_area
                threads: 1
                timeout_seconds: 300
                location: us-central1 # تأكدي لو الداتا في مكان تاني غير أمريكا اكتبيها هنا
            target: dev" > ~/.dbt/profiles.yml

      - name: Run dbt
        run: |
          dbt run --full-refresh
